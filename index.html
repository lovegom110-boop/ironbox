<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IRONBOX — 타임박스 플래너</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-variable.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-name">IRONBOX</span></div>
    <div class="datenav">
      <button id="prev-day" class="icon-btn" title="이전 날">‹</button>
      <button id="date-label" class="date-label" title="달력 열기">날짜</button>
      <button id="next-day" class="icon-btn" title="다음 날">›</button>
      <button id="today-btn" class="ghost-btn">오늘</button>
    </div>
    <div class="actions">
      <button id="open-calendar" class="icon-btn" title="달력">달력</button>
      <button id="open-search" class="icon-btn" title="검색">검색</button>
      <div class="menu-wrap">
        <button id="open-menu" class="icon-btn" title="저장/백업">백업</button>
        <div id="menu" class="menu" hidden>
          <div class="menu-section">저장 상태</div>
          <div id="save-status" class="save-status">이 기기에 저장됨</div>
          <button class="menu-item" id="connect-file">디스크 파일에 자동저장 연결</button>
          <button class="menu-item" id="open-file">파일 열어서 불러오기</button>
          <hr />
          <button class="menu-item" id="export-json">JSON 백업 내보내기</button>
          <button class="menu-item" id="import-json">JSON 불러오기 (파일 선택)</button>
          <hr />
          <div class="menu-section">Google 캘린더</div>
          <button class="menu-item" id="gcal-reset">설정 초기화 (Client ID·캘린더 선택 삭제)</button>
          <div class="menu-note" id="gcal-status"></div>
          <hr />
          <div class="menu-note">데이터는 이 기기/파일에만 저장되며 서버로 전송되지 않습니다. Google 캘린더 기능은 본인 계정으로만 일정이 전송됩니다.</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- 1. 기상 직후 할 일 -->
    <section class="card wake-card">
      <span class="field-label">오늘의 나에게 하고 싶은 말</span>
      <div id="wake-field" class="text-field"></div>
    </section>

    <!-- 2. Big 3 -->
    <section class="card">
      <div class="sec-head">
        <h2>오늘의 Big 3</h2>
        <span id="big3-count" class="sec-sub"></span>
      </div>
      <div id="big3-list" class="big3-list"></div>
    </section>

    <!-- 3. 할 일 + 타임라인 -->
    <section class="plan-grid">
      <div class="card inbox-panel">
        <div class="sec-head">
          <h2>할 일</h2>
          <span class="sec-sub">드래그해서 타임라인에 배치</span>
        </div>
        <form id="braindump-form" class="braindump">
          <input id="braindump-input" type="text" placeholder="머릿속 할 일을 빠르게 적기 (Enter)" autocomplete="off" />
          <button type="submit" id="add-btn" class="btn-primary">추가</button>
        </form>
        <div class="filters" id="status-filters">
          <button class="chip active" data-f="all">전체</button>
          <button class="chip" data-f="active">미완료</button>
          <button class="chip" data-f="done">완료</button>
        </div>
        <ul id="task-list" class="task-list"></ul>
        <p id="inbox-empty" class="empty-hint">머릿속 할 일을 모두 적고, 체크박스로 완료를 표시하세요.</p>
      </div>

      <div class="card timeline-panel">
        <div class="sec-head">
          <h2>타임라인 · 30분</h2>
          <span id="plan-total" class="pill-badge"></span>
        </div>
        <div id="selected-hint" class="selected-hint" hidden></div>
        <div id="timeline" class="timeline"></div>
        <div class="panel-footer">
          <button id="export-text" class="ghost-btn">📝 업무일지 텍스트로 저장</button>
          <button id="gcal-send" class="btn-primary">→ Google 캘린더로 오늘 일정 보내기</button>
        </div>
      </div>
    </section>

    <!-- 4. 회고 (맨 아래) -->
    <section class="card review-card">
      <div class="sec-head"><h2>회고 · 계획 vs 실제</h2></div>
      <div id="review-summary" class="review-summary"></div>
      <div id="review-blocks" class="review-blocks"></div>
      <span class="field-label" style="margin-top:18px">오늘 회고</span>
      <div id="feedback-field" class="text-field multi"></div>
    </section>

    <!-- 5. 내일 업무 계획 -->
    <section class="card">
      <div class="sec-head"><h2>내일 업무 계획</h2></div>
      <div id="tomorrow-field" class="text-field multi"></div>
    </section>
  </main>

  <!-- 달력 -->
  <div id="calendar-modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <button id="cal-prev" class="icon-btn">‹</button>
        <span id="cal-title" class="modal-title">2026.05</span>
        <button id="cal-next" class="icon-btn">›</button>
        <button id="cal-close" class="close-btn">✕</button>
      </div>
      <div id="calendar" class="calendar"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div id="search-modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <input id="search-input" class="search-input" type="text" placeholder="과거 할 일·회고 검색" />
        <button id="search-close" class="close-btn">✕</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <input type="file" id="import-file" accept="application/json" hidden />
  <div id="toast" class="toast" hidden></div>

  <script src="js/store.js"></script>
  <script src="js/timebox.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/gcal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
