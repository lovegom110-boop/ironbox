name: Deploy to Firebase Hosting on push (main)

# main에 push될 때마다 GitHub 서버에서 Firebase Hosting으로 자동 배포.
# 회사망에서 firebase.tools 접속이 막혀도, 배포가 GitHub 인프라에서 실행되어 문제없음.
# 실패 시 firebase CLI 에러를 GitHub 어노테이션(::error::)으로 내보내 원인 추적이 쉽도록 함.

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live)
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRONBOX_3200A }}
        run: |
          printf '%s' "$SA_JSON" > "$HOME/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          echo "service account file size: $(wc -c < "$HOME/sa.json") bytes"
          echo "client_email present: $(grep -c client_email "$HOME/sa.json")"
          set +e
          npx firebase-tools@latest deploy --only hosting --project ironbox-3200a --non-interactive 2>&1 | tee deploy.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::group::DEPLOY ERROR DETAIL"
            grep -iE "error|permission|denied|not found|403|401|enable|api |quota|billing" deploy.log | tail -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            echo "::endgroup::"
            exit "$code"
          fi
          echo "Deploy succeeded."
